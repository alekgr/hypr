$terminal = kitty
$fileManager = ranger
$menu = tofi-drun --drun-launch=true 
$firefox = firefox
$librewolf = librewolf
$brave     = brave-beta --hide-crash-restore-bubble
$chromium = chromium 
$floorp   = floorp
$chat	  = weechat
$nvim     = nvim
$task     = task
$graphics 	  = gimp
$graphics2	  = blender
$screenshot	  = grim
$nwg-menu	  = nwg-bar
$paste		  = wl-paste

#env 
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRSHOT_DIR, $HOME/Photos/Screenshots
env = AQ_NO_MODIFIERS, 1
env = AQ_FORCE_LINEAR_BLIT, 1
env = AD_DEBUG, no_buffer_age

#this is for black screen on T460
#new Atomatic Modestting path in Aquamarine backend is the issue  for intel 460
env = AQ_NO_ATOMIC, 1
env = WLR_DRM_NO_ATOMIC, 1
env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card
